<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام صيانة الأجهزة الطبية</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f6; padding: 15px; direction: rtl; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
        .btn { background: #27ae60; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 18px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background: #3498db; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏥 تسجيل عطل جهاز طبي</h2>
    
    <label>القسم</label>
    <select id="dept">
        <option>العناية المركزة</option>
        <option>الطوارئ</option>
        <option>الأشعة</option>
        <option>المناظير</option>
        <option>العمليات</option>
    </select>

    <label>اسم الجهاز</label>
    <input type="text" id="deviceName" placeholder="مثال: Monitor / Ventilator">

    <label>الموديل / الماركة</label>
    <input type="text" id="model" placeholder="مثال: Nihon Kohden">

    <label>وصف العطل</label>
    <input type="text" id="issue" placeholder="اشرح المشكلة باختصار">

    <button class="btn" onclick="sendData()">حفظ البلاغ 🚀</button>

    <table id="dataTable">
        <thead>
            <tr>
                <th>التاريخ</th>
                <th>القسم</th>
                <th>الجهاز</th>
                <th>العطل</th>
            </tr>
        </thead>
        <tbody>
            <tr><td colspan="4">جارٍ تحميل البيانات السابقة...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // الرابط بتاعك اللي آخره exec
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyP8LauSgzW2j97t0GcmbOglKWKDyBcEU6rRCAuuHYnNLEHp9U6GR1CdE9YGCOAbihG/exec";

    function sendData() {
        const btn = document.querySelector(".btn");
        btn.innerText = "جارٍ الحفظ...";
        btn.disabled = true;

        const formData = new FormData();
        formData.append('dept', document.getElementById('dept').value);
        formData.append('deviceName', document.getElementById('deviceName').value);
        formData.append('model', document.getElementById('model').value);
        formData.append('issue', document.getElementById('issue').value);

        fetch(SCRIPT_URL, { method: 'POST', body: formData })
        .then(() => {
            alert("تم التسجيل بنجاح!");
            btn.innerText = "حفظ البلاغ 🚀";
            btn.disabled = false;
            loadData();
        })
        .catch(err => {
            alert("خطأ في الاتصال");
            btn.disabled = false;
        });
    }

    function loadData() {
        fetch(SCRIPT_URL)
        .then(res => res.json())
        .then(data => {
            const tbody = document.querySelector("#dataTable tbody");
            tbody.innerHTML = "";
            data.reverse().forEach(row => {
                const newRow = tbody.insertRow();
                newRow.insertCell(0).innerText = new Date(row[0]).toLocaleDateString('ar-EG');
                newRow.insertCell(1).innerText = row[1];
                newRow.insertCell(2).innerText = row[2];
                newRow.insertCell(3).innerText = row[4];
            });
        });
    }

    window.onload = loadData;
</script>

</body>
</html>
                <div><label>نهاية العقد</label><input type="date" id="cEnd"></div>
                <div><label>الحالة / النوع</label><input type="text" id="cStatus"></div>
                <button class="btn btn-success" id="btnContract" onclick="addContract()">➕ حفظ العقد</button>
            </div>
            <div class="filter-bar">
                <label>🔍 تصفية العقود بالقسم:</label>
                <select id="filterContracts" onchange="renderAll()" style="width:200px;"></select>
                <button class="btn btn-info" onclick="printReport('contracts')">🖨️ طباعة العقود</button>
            </div>
            <div class="table-wrapper"><table id="cTable"><thead><tr><th>القسم</th><th>الجهاز</th><th>الماركة</th><th>الموديل</th><th>S/N</th><th>الوكيل</th><th>بداية العقد</th><th>نهاية العقد</th><th>الحالة</th><th>إجراءات</th></tr></thead><tbody></tbody></table></div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzxmd64V4UswZ2Bpz0wwjcghTee6HJv9v0e06CecannW9wUhIfumnroi1sXorttzPHN/exec';

    let devices = JSON.parse(localStorage.getItem('devices')) || [];
    let activeFaults = JSON.parse(localStorage.getItem('activeFaults')) || [];
    let closedFaults = JSON.parse(localStorage.getItem('closedFaults')) || [];
    let contracts = JSON.parse(localStorage.getItem('contracts')) || [];

    function save() {
        localStorage.setItem('devices', JSON.stringify(devices));
        localStorage.setItem('activeFaults', JSON.stringify(activeFaults));
        localStorage.setItem('closedFaults', JSON.stringify(closedFaults));
        localStorage.setItem('contracts', JSON.stringify(contracts));
        renderAll();
    }

    function sync(data, sheet) {
        let fd = new FormData(); fd.append('targetSheet', sheet);
        Object.keys(data).forEach(k => fd.append(k, data[k]));
        fetch(SCRIPT_URL, {method:'POST', body:fd}).catch(e=>console.log('Sync Error'));
    }

    function addDevice() {
        let idx = document.getElementById('editIdxDev').value;
        let dpt = document.getElementById('devDept').value === '--- قسم جديد ---' ? document.getElementById('devNewDept').value : document.getElementById('devDept').value;
        let obj = { dept: dpt, name: document.getElementById('devName').value, brand: document.getElementById('devBrand').value, model: document.getElementById('devModel').value, sn: document.getElementById('devSN').value, agent: document.getElementById('devAgent').value };
        if(idx == "-1") { devices.push(obj); sync(obj, 'الأجهزة'); } else { devices[idx] = obj; document.getElementById('editIdxDev').value = "-1"; }
        save(); resetForms();
    }

    function addFault() {
        let idx = document.getElementById('editIdxFault').value;
        let obj = { dept: document.getElementById('fDeptForm').value, device: document.getElementById('fDevice').value, brand: document.getElementById('fBrand').value, model: document.getElementById('fModel').value, sn: document.getElementById('fSN').value, date: document.getElementById('fDate').value, desc: document.getElementById('fDesc').value, actions: document.getElementById('fActions').value };
        if(idx == "-1") { activeFaults.push(obj); sync(obj, 'الأعطال'); } else { activeFaults[idx] = obj; document.getElementById('editIdxFault').value = "-1"; }
        save(); resetForms();
    }

    function addContract() {
        let idx = document.getElementById('editIdxContract').value;
        let obj = { dept: document.getElementById('cDeptForm').value, device: document.getElementById('cDevice').value, brand: document.getElementById('cBrand').value, model: document.getElementById('cModel').value, sn: document.getElementById('cSN').value, agent: document.getElementById('cAgent').value, start: document.getElementById('cStart').value, end: document.getElementById('cEnd').value, status: document.getElementById('cStatus').value };
        if(idx == "-1") { contracts.push(obj); sync(obj, 'العقود'); } else { contracts[idx] = obj; document.getElementById('editIdxContract').value = "-1"; }
        save(); resetForms();
    }

    function closeFault(i) {
        let f = activeFaults.splice(i, 1)[0];
        f.closedDate = new Date().toLocaleDateString('ar-EG');
        closedFaults.push(f); sync(f, 'الأعطال_المغلقة'); save();
    }

    function editDev(i) {
        let d = devices[i]; document.getElementById('devDept').value = d.dept; document.getElementById('devName').value = d.name; document.getElementById('devBrand').value = d.brand; document.getElementById('devModel').value = d.model; document.getElementById('devSN').value = d.sn; document.getElementById('devAgent').value = d.agent;
        document.getElementById('editIdxDev').value = i; window.scrollTo(0,0);
    }
    function editFault(i, type) {
        let f = (type==='active') ? activeFaults[i] : closedFaults[i];
        document.getElementById('fDeptForm').value = f.dept; document.getElementById('fDevice').value = f.device; document.getElementById('fBrand').value = f.brand; document.getElementById('fModel').value = f.model; document.getElementById('fSN').value = f.sn; document.getElementById('fDate').value = f.date; document.getElementById('fDesc').value = f.desc; document.getElementById('fActions').value = f.actions;
        if(type==='active') document.getElementById('editIdxFault').value = i; window.scrollTo(0,0);
    }
    function editContract(i) {
        let c = contracts[i]; document.getElementById('cDeptForm').value = c.dept; document.getElementById('cDevice').value = c.device; document.getElementById('cBrand').value = c.brand; document.getElementById('cModel').value = c.model; document.getElementById('cSN').value = c.sn; document.getElementById('cAgent').value = c.agent; document.getElementById('cStart').value = c.start; document.getElementById('cEnd').value = c.end; document.getElementById('cStatus').value = c.status;
        document.getElementById('editIdxContract').value = i; window.scrollTo(0,0);
    }

    function renderAll() {
        const fDev = document.getElementById('filterDev').value;
        const fFlt = document.getElementById('filterFaults').value;
        const fCon = document.getElementById('filterContracts').value;

        // الأجهزة
        let dList = (fDev === 'الكل' || !fDev) ? devices : devices.filter(d => d.dept === fDev);
        document.querySelector('#devTable tbody').innerHTML = dList.map((d,i)=>`<tr><td>${d.dept}</td><td>${d.name}</td><td>${d.brand}</td><td>${d.model}</td><td>${d.sn}</td><td>${d.agent}</td><td><button class="btn btn-edit" onclick="editDev(${i})">✏️</button></td></tr>`).join('');

        // الأعطال النشطة
        let aList = (fFlt === 'الكل' || !fFlt) ? activeFaults : activeFaults.filter(f => f.dept === fFlt);
        document.querySelector('#fActiveTable tbody').innerHTML = aList.map((f,i)=>`<tr><td>${f.dept}</td><td>${f.device}</td><td>${f.brand}</td><td>${f.model}</td><td>${f.sn}</td><td>${f.desc}</td><td>${f.date}</td><td><button class="btn btn-close" onclick="closeFault(${i})">🔒</button><button class="btn btn-edit" onclick="editFault(${i},'active')">✏️</button></td></tr>`).join('');

        // الأعطال المغلقة
        let cList = (fFlt === 'الكل' || !fFlt) ? closedFaults : closedFaults.filter(f => f.dept === fFlt);
        document.querySelector('#fClosedTable tbody').innerHTML = cList.map((f,i)=>`<tr><td>${f.dept}</td><td>${f.device}</td><td>${f.brand}</td><td>${f.model}</td><td>${f.sn}</td><td>${f.closedDate}</td><td>${f.actions}</td><td><button class="btn btn-edit" onclick="editFault(${i},'closed')">✏️</button></td></tr>`).join('');

        // العقود
        let kList = (fCon === 'الكل' || !fCon) ? contracts : contracts.filter(c => c.dept === fCon);
        document.querySelector('#cTable tbody').innerHTML = kList.map((c,i)=>{
            let days = Math.ceil((new Date(c.end) - new Date())/(1000*60*60*24));
            let cls = days < 0 ? 'expired-row' : (days < 60 ? 'warning-row' : '');
            return `<tr class="${cls}"><td>${c.dept}</td><td>${c.device}</td><td>${c.brand}</td><td>${c.model}</td><td>${c.sn}</td><td>${c.agent}</td><td>${c.start || '-'}</td><td>${c.end || '-'}</td><td>${c.status}</td><td><button class="btn btn-edit" onclick="editContract(${i})">✏️</button></td></tr>`;
        }).join('');

        updateFilters();
        
        let expSoon = contracts.filter(c => {
            let d = Math.ceil((new Date(c.end) - new Date())/(1000*60*60*24));
            return d >= 0 && d < 60;
        }).length;

        document.getElementById('stats').innerHTML = `
            <div class="stat-box"><h3>🏥 إجمالي الأجهزة</h3><h2>${devices.length}</h2></div>
            <div class="stat-box" style="color:#b91c1c;"><h3>🔧 أعطال نشطة</h3><h2>${activeFaults.length}</h2></div>
            <div class="stat-box" style="color:#1f8a4c;"><h3>✅ تم إصلاحها</h3><h2>${closedFaults.length}</h2></div>
            <div class="stat-box" style="color:#f39c12;"><h3>📄 عقود أوشكت</h3><h2>${expSoon}</h2></div>
        `;
    }

    function updateFilters() {
        let dpts = [...new Set(devices.map(d => d.dept))];
        ['filterDev', 'filterFaults', 'filterContracts', 'fDeptForm', 'cDeptForm'].forEach(id => {
            let sel = document.getElementById(id);
            if(!sel) return;
            let cur = sel.value;
            let options = (id === 'fDeptForm' || id === 'cDeptForm') ? dpts.map(d=>`<option value="${d}">${d}</option>`).join('') : '<option value="الكل">كل الأقسام</option>' + dpts.map(d=>`<option value="${d}">${d}</option>`).join('');
            sel.innerHTML = options;
            if(cur) sel.value = cur;
        });
    }

    function printReport(type) {
        let win = window.open('', '_blank');
        let t = "", c = "";
        if(type==='devices') { t="تقرير الأجهزة"; c=document.getElementById('devTable').outerHTML; }
        else if(type==='activeFaults') { t="الأعطال النشطة"; c=document.getElementById('fActiveTable').outerHTML; }
        else if(type==='closedFaults') { t="سجل الإصلاح"; c=document.getElementById('fClosedTable').outerHTML; }
        else { t="تقرير العقود"; c=document.getElementById('cTable').outerHTML; }
        win.document.write(`<html dir="rtl"><head><style>table{width:100%;border-collapse:collapse;} th,td{border:1px solid #000;padding:8px;text-align:right;} .btn{display:none;}</style></head><body><h2 style="text-align:center;">مستشفيات جامعة المنوفية</h2><h3>${t}</h3>${c}</body></html>`);
        win.document.close(); win.print();
    }

    function resetForms() { document.querySelectorAll('input[type="text"], textarea, input[type="date"]').forEach(i => i.value = ''); document.querySelectorAll('input[type="hidden"]').forEach(i => i.value = '-1'); }
    function showTab(id) { document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active')); document.getElementById(id).classList.add('active'); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); event.target.classList.add('active'); }
    document.getElementById('devDept').addEventListener('change', function(){ document.getElementById('devNewDept').style.display = this.value==='--- قسم جديد ---'?'block':'none'; });

    save();
</script>
</body>
</html>
